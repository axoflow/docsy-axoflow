# Inline-SVG replacement for FontAwesome icons. Loaded as site.Data.icons
# and rendered by themes/docsy-axoflow/layouts/_partials/icon.html.
#
# Why this file exists: FontAwesome Free ships a 157 KB woff2 webfont plus
# ~100 KB of CSS for 2 000+ glyph classes — for the ~17 icons this docs
# site actually uses. Storing each used icon's SVG path data here removes
# the entire FA dependency from the critical path: no @font-face download,
# no font-display delay, no CSS bloat, just inline SVGs that ship with the
# HTML and follow `currentColor` for theming.
#
# Adding a new icon:
#   1. Grab the SVG from
#      themes/docsy/node_modules/@fortawesome/fontawesome-free/svgs/{solid,brands}/<name>.svg
#   2. Copy the `viewBox` and the entire `<path …/>` element verbatim.
#   3. Add an entry below.
#   4. Reference it from templates as
#      `{{ partial "icon.html" (dict "name" "<name>") }}`.
#
# Aliases (for FA's legacy class names like fa-search → fa-magnifying-glass)
# point at the canonical entry to keep the data file deduplicated.


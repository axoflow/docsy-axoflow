{{ with .Page.Params.redirect }} <meta http-equiv="refresh" content="0;URL='{{ . }}'" /> {{ end }}

{{ if .Site.Params.offlineSearchPagefind -}}
<!-- Pagefind 1.5+ Component UI (replaces the legacy PagefindUI / pagefind-ui.js).
     Web components auto-register from these assets — see <pagefind-modal>,
     <pagefind-modal-trigger>, <pagefind-searchbox>, <pagefind-config>.

     The stylesheet stays off the render-blocking path via the print-media
     trick (loaded async, applied to "all" once available).

     highlight.js only matters on pages opened from a search result (which
     carry a ?highlight= param), so it loads eagerly *only* in that case. It
     exposes window.PagefindHighlight as a module side effect. -->
<link rel="preload" href="{{ "pagefind/pagefind-component-ui.css" | relURL }}" as="style">
<link rel="stylesheet" href="{{ "pagefind/pagefind-component-ui.css" | relURL }}" media="print" onload="this.media='all';this.onload=null">
<noscript><link rel="stylesheet" href="{{ "pagefind/pagefind-component-ui.css" | relURL }}"></noscript>
<script>
  (function () {
    var uiURL = "{{ "pagefind/pagefind-component-ui.js" | relURL }}";
    var hlURL = "{{ "pagefind/pagefind-highlight.js" | relURL }}";

    // Result pages (opened with ?highlight=) need the highlighter immediately.
    if (window.location.search.indexOf("highlight=") !== -1) {
      import(hlURL).then(function () {
        if (window.PagefindHighlight) {
          new window.PagefindHighlight({ highlightParam: "highlight" });
        }
      });
    }

    // Load the Component UI once, on first interaction or at idle.
    var events = ["pointerdown", "keydown", "touchstart", "focusin"];
    var loaded = false;
    function loadUI() {
      if (loaded) { return; }
      loaded = true;
      events.forEach(function (evt) { window.removeEventListener(evt, loadUI, true); });
      import(uiURL);
    }
    events.forEach(function (evt) { window.addEventListener(evt, loadUI, true); });
    if ("requestIdleCallback" in window) {
      requestIdleCallback(loadUI, { timeout: 2500 });
    } else {
      window.addEventListener("load", function () { setTimeout(loadUI, 1200); });
    }
  })();
</script>
{{ end -}}

<!-- Enable replacing parameters from URL parameter -->
{{ if .Params.replaceFromURL }}
    <script src="{{ "js/replace-from-url.js" | relURL }}" type="application/x-javascript" defer></script>
{{ end }}

<!-- Load material icons if needed. Use it like this: <span class="material-icons">face</span>
Don't add rel="preconnect" or rel="dns-prefetch" to the links, they break -->
{{ if .HasShortcode "insert-material-icon" }}
<link href="https://fonts.googleapis.com/css?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Two+Tone|Material+Icons+Round|Material+Icons+Sharp" rel="stylesheet">
{{ end }}
{{ if .HasShortcode "insert-pictogrammer-icon" }}
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
{{ end }}

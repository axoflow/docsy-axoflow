StylesPath = themes/docsy-axoflow/vale/styles

MinAlertLevel = suggestion

Vocab = axoflow

Packages = https://github.com/tbhb/vale-ai-tells/releases/download/v1.6.3/ai-tells.zip

[*.{md}]
BasedOnStyles = Vale, Microsoft, ai-tells

# Strip Hugo shortcodes and inline code spans before linting so that identifiers
# and URL path segments inside {{< relref >}}, {{% xref %}}, and `code` aren't
# flagged as misspellings or term-case violations.
TokenIgnores = (?s){{[%<].*?[%>]}}, `[^`]+`
BlockIgnores = (?s) *({{%[^%]+%}}|{{<[^>]+>}})

